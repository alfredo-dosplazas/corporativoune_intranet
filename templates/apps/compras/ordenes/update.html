{% load django_tables2 %}
<c-layouts.app>
    <c-slot name="header">
        <div class="grid grid-cols-1 md:grid-cols-3 items-center gap-4">

            <!-- START -->
            <div class="justify-self-start">
                <h1 class="font-bold text-xl flex items-center gap-2">{{ orden }}</h1>
            </div>

            <!-- MIDDLE -->
            <div class="justify-self-center w-full flex justify-center">

            </div>


            <!-- END -->
            <div class="justify-self-end flex gap-2">
                <a href="#"
                   class="btn btn-sm"
                   onclick="abrirPDF('{% url 'compras:ordenes__pdf' orden.pk %}'); return false;">
                    PDF
                </a>

                <button form="orden-form" class="btn btn-primary btn-sm">Guardar</button>
            </div>
        </div>

    </c-slot>

    <c-apps.compras.ordenes.form/>
</c-layouts.app>
