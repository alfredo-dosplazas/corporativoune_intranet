<select
        id="select-obras"
        name="obras"
        multiple
        placeholder="Buscar y seleccionar obras..."
        class="w-full"
        required>

    {% for obra in obras %}
        <option value="{{ obra.id }}">
            [{{ obra.empresa }}] | {{ obra.idobra }} | {{ obra.descripcion }}
        </option>
    {% empty %}
        <option value="" disabled selected>-- Seleccione una empresa válida --</option>
    {% endfor %}
</select>
