{% load django_tables2 %}
<c-layouts.app>
    <c-slot name="header">
        <div class="grid grid-cols-1 md:grid-cols-3 items-center gap-4">

            <!-- START -->
            <div class="justify-self-start">
                <h1 class="font-bold text-xl flex items-center gap-2">Editar {{ orden }}</h1>
            </div>

            <!-- MIDDLE -->
            <div class="justify-self-center w-full flex justify-center">

            </div>


            <!-- END -->
            <div class="justify-self-end">
                <a href="{% url 'refacciones_servicios:orden_compra__pdf' orden.pk %}"
                   onclick="abrirPDF('{% url 'refacciones_servicios:orden_compra__pdf' orden.pk %}'); return false;"
                   class="btn btn-sm btn-outline btn-secondary">
                    <span class="icon-[tabler--file-type-pdf]"></span>
                    PDF
                </a>

                <button form="orden-form" class="btn btn-primary btn-sm">Guardar</button>
            </div>
        </div>

    </c-slot>

    <c-apps.refacciones_servicios.ordenes.form/>
</c-layouts.app>
