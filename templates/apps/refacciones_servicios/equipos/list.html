{% load django_tables2 %}

<c-layouts.app>
    <!-- ========================================================== -->
    <!-- HEADER SLOT (Barra de control unificada) -->
    <!-- ========================================================== -->
    <c-slot name="header">
        <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between w-full py-1">

            <!-- Título y Contexto (Izquierda) -->
            <div class="flex items-center gap-3">
                <div class="p-2 bg-primary/10 text-primary rounded-xl hidden sm:block">
                    <span class="icon-[tabler--clipboard-list] size-6 block"></span>
                </div>
                <div>
                    <h1 class="text-base-content font-bold text-lg md:text-xl flex items-center gap-2 tracking-tight">
                        Equipos
                    </h1>
                    <p class="text-xs text-base-content/60 font-normal">

                    </p>
                </div>
            </div>

            <!-- Acciones, Búsqueda y Filtros (Derecha) -->
            <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-2 w-full md:w-auto">

                <!-- Buscador Reutilizable o Input del Sistema -->
                <div class="relative flex-1 sm:w-64 md:w-72">
                    <c-shared.searchbar/>
                </div>

                <!-- Botón de Acción Primaria (Crear) -->
                {% if perms.refacciones_servicios.add_equipo %}
                    <a href="{% url 'refacciones_servicios:equipos__create' %}"
                       class="btn btn-primary btn-sm normal-case gap-1.5 font-semibold shadow-sm w-full sm:w-auto order-first sm:order-last">
                        <span class="icon-[tabler--plus] size-4"></span>
                        Nuevo Equipo
                    </a>
                {% endif %}

            </div>
        </div>
    </c-slot>

    {% render_table table %}

</c-layouts.app>
