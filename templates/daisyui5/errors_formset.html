{% if formset.non_form_errors %}
    <div role="alert" class="alert alert-error shadow-sm border border-error/20 rounded-xl p-4 my-4 flex items-start gap-3">
        <span class="icon-[tabler--alert-circle] size-5 shrink-0 text-error-content mt-0.5"></span>

        <div class="flex flex-col gap-1 text-sm text-error-content w-full">
            {% if form_error_title %}
                <h4 class="font-bold tracking-tight text-sm">
                    {{ form_error_title }}
                </h4>
            {% else %}
                <h4 class="font-bold tracking-tight text-sm">
                    Atención: Revisa el formulario general
                </h4>
            {% endif %}

            <div class="text-xs opacity-90 leading-relaxed">
                {% for error in formset.non_form_errors %}
                    <p class="{% if not forloop.first %}mt-1{% endif %} flex items-center gap-1.5">
                        <span class="inline-block size-1 rounded-full bg-current opacity-70"></span>
                        {{ error }}
                    </p>
                {% endfor %}
            </div>
        </div>
    </div>
{% endif %}
