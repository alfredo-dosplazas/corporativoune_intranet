{% load money %}
{% load humanize %}
{% load crispy_forms_filters %}
{% load crispy_forms_tags %}

{% if form.errors %}
    <div id="form-errors-banner"
         class="alert alert-error alert-soft shadow mb-4 py-2 px-4 rounded-lg flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-5 w-5 text-error" fill="none"
             viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <div>
            <span class="font-semibold text-sm">Hay errores en el formulario.</span>
            <span class="text-xs opacity-80">Por favor revisa las celdas marcadas en rojo.</span>
        </div>
    </div>
{% endif %}

<div class="card shadow mb-4 bg-base-100">
    <div class="card-body">
        {% crispy form %}
    </div>
</div>
